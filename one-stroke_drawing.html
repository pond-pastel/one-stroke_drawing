<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="無料で遊べる一筆書きです。">
    <meta name="keywords" content="ゲーム,無料,広告なし,一筆書き,脳トレ">
    <title>無料で遊べる一筆書き</title>
    <link rel="stylesheet" href="one-stroke_drawing.css">
</head>
<body>
    <!--Ver.1.0.0-->
    <script src="one-stroke_drawing.js"></script>
    <h1 class="before-starting">一筆書き</h1>
    <div class="before-starting" id="stage-select">
        ステージ選択
        <select id="stage-select-content">
            <option value="0">Stage1</option>
        </select>
    </div>
    <p class="flex-center before-starting">
        <button id="description-button">ルール説明</button>
    </p>
    <p class="flex-center before-starting">
        <button id="start-button">Start!</button>
    </p>
    <div class="playing" id="stage" style="display: none;"></div>
    <p class="flex-center playing" style="display: none;">
        <button id="reset-button">Reset</button>
    </p>
    <p class="flex-center playing" style="display: none;">
        <button id="pause-button">Pause</button>
    </p>
</body>
</html>
